name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/LinkittyDo.Api
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Restore dependencies
        run: dotnet restore
      - name: Build
        run: dotnet build --no-restore
      - name: Test
        run: dotnet test ../LinkittyDo.Api.Tests/LinkittyDo.Api.Tests.csproj --no-build --verbosity normal
        working-directory: src/LinkittyDo.Api

  frontend:
    name: Frontend Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/linkittydo-web
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/linkittydo-web/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npx eslint src/
      - name: Type check
        run: npx tsc --noEmit
      - name: Test
        run: npx vitest run
      - name: Build
        run: npx vite build
